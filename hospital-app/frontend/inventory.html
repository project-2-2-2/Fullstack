<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="brand">Hospital App</div>
        <div class="nav-links">
            <a href="dashboard.html">Patients</a>
            <a href="doctors.html">Doctors</a>
            <a href="appointments.html">Appointments</a>
            <a href="inventory.html">Inventory</a>
            <a href="#" id="logout-btn">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <h2 id="form-title">Pharmacy Inventory</h2>
            <form id="inventory-form">
                <input type="hidden" id="inventory-id">
                <label>Item Name</label>
                <input type="text" id="i-item" placeholder="Item Name" required>
                <label>Quantity</label>
                <input type="number" id="i-quantity" placeholder="Quantity" required>
                <label>Unit (e.g. Tablets, Liters)</label>
                <input type="text" id="i-unit" placeholder="Unit" required>
                <label>Supplier</label>
                <input type="text" id="i-supplier" placeholder="Supplier Name" required>
                <label>Expiry Date</label>
                <input type="date" id="i-expiryDate" required>
                <button type="submit" id="submit-btn">Add Item</button>
                <button type="button" id="cancel-edit-btn" class="hidden">Cancel Edit</button>
            </form>
        </div>

        <div class="card">
            <h2>Inventory List</h2>
            <table id="inventory-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Unit</th>
                        <th>Supplier</th>
                        <th>Expiry Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                    <!-- Table rows populated via JS -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadInventory();
            document.getElementById('inventory-form').addEventListener('submit', handleInventoryForm);
            document.getElementById('cancel-edit-btn').addEventListener('click', () => {
                document.getElementById('inventory-form').reset();
                document.getElementById('inventory-id').value = '';
                document.getElementById('form-title').innerText = 'Pharmacy Inventory';
                document.getElementById('submit-btn').innerText = 'Add Item';
                document.getElementById('cancel-edit-btn').classList.add('hidden');
            });
        });

        async function loadInventory() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('http://localhost:5000/api/inventory', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const items = await res.json();
                const tbody = document.getElementById('inventory-body');
                tbody.innerHTML = '';
                items.forEach(i => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${i.item}</td>
                        <td>${i.quantity}</td>
                        <td>${i.unit}</td>
                        <td>${i.supplier}</td>
                        <td>${i.expiryDate}</td>
                        <td class="action-btns">
                            <button class="edit-btn" onclick="editInventory('${i._id}', '${i.item}', ${i.quantity}, '${i.unit}', '${i.supplier}', '${i.expiryDate}')">Edit</button>
                            <button class="delete-btn" onclick="deleteInventory('${i._id}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error('Error loading inventory:', err);
            }
        }

        async function handleInventoryForm(e) {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const id = document.getElementById('inventory-id').value;
            const item = document.getElementById('i-item').value;
            const quantity = document.getElementById('i-quantity').value;
            const unit = document.getElementById('i-unit').value;
            const supplier = document.getElementById('i-supplier').value;
            const expiryDate = document.getElementById('i-expiryDate').value;

            const method = id ? 'PUT' : 'POST';
            const url = id ? `http://localhost:5000/api/inventory/${id}` : 'http://localhost:5000/api/inventory';

            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ item, quantity, unit, supplier, expiryDate })
                });
                const data = await res.json();
                if (data._id || data.msg) {
                    document.getElementById('inventory-form').reset();
                    document.getElementById('inventory-id').value = '';
                    document.getElementById('form-title').innerText = 'Pharmacy Inventory';
                    document.getElementById('submit-btn').innerText = 'Add Item';
                    document.getElementById('cancel-edit-btn').classList.add('hidden');
                    loadInventory();
                }
            } catch (err) {
                console.error('Error handling inventory form:', err);
            }
        }

        function editInventory(id, item, quantity, unit, supplier, expiryDate) {
            document.getElementById('inventory-id').value = id;
            document.getElementById('i-item').value = item;
            document.getElementById('i-quantity').value = quantity;
            document.getElementById('i-unit').value = unit;
            document.getElementById('i-supplier').value = supplier;
            document.getElementById('i-expiryDate').value = expiryDate;

            document.getElementById('form-title').innerText = 'Edit Item';
            document.getElementById('submit-btn').innerText = 'Update Item';
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
        }

        async function deleteInventory(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`http://localhost:5000/api/inventory/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.msg) {
                    loadInventory();
                }
            } catch (err) {
                console.error('Error deleting inventory item:', err);
            }
        }
    </script>
</body>
</html>
