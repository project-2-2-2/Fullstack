<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="brand">City Hospital</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="index.html">Login</a>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <h2>Register Doctor/Admin</h2>
            <img src="https://via.placeholder.com/150/FF0000/FFFFFF?text=Hospital+Staff" alt="Hospital Icon" style="width: 150px; display: block; margin: 0 auto;">
            <form id="register-form">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Username" required>
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <p id="message" style="color: red;"></p>
        </div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('message').innerText = data.msg;
                }
            } catch (err) {
                document.getElementById('message').innerText = 'Server error';
            }
        });
    </script>
</body>
</html>
