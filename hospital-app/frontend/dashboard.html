<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="brand">Hospital App</div>
        <div class="nav-links">
            <a href="dashboard.html">Patients</a>
            <a href="doctors.html">Doctors</a>
            <a href="appointments.html">Appointments</a>
            <a href="inventory.html">Inventory</a>
            <a href="#" id="logout-btn">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div id="moving-text-container">
            <div id="moving-text">EMERGENCY ALERT: Check latest patient records!</div>
        </div>
        <div class="card">
            <button id="change-bg-btn" style="width: auto;">Change Theme Color</button>
            <h2 id="form-title">Register Patient</h2>
            <form id="patient-form">
                <input type="hidden" id="patient-id">
                <label>Name</label>
                <input type="text" id="p-name" placeholder="Patient Name" required>
                <label>Age</label>
                <input type="number" id="p-age" placeholder="Age" required>
                <label>Gender</label>
                <select id="p-gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <label>Condition</label>
                <input type="text" id="p-condition" placeholder="Condition (e.g. Fever)" required>
                <label>Doctor</label>
                <input type="text" id="p-doctor" placeholder="Assigned Doctor" required>
                <button type="submit" id="submit-btn">Add Patient</button>
                <button type="button" id="cancel-edit-btn" class="hidden">Cancel Edit</button>
            </form>
        </div>

        <div class="card">
            <h2>Patient List</h2>
            <table id="patients-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Condition</th>
                        <th>Doctor</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patients-body">
                    <!-- Table rows populated via JS -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
