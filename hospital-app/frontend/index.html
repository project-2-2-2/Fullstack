<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div>Hospital System</div>
        <div>
            <a href="register.html">Register</a>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <h2>Login</h2>
            <img src="https://via.placeholder.com/150/0000FF/808080?text=Doctor+Login" alt="Hospital Icon" style="width: 150px; display: block; margin: 0 auto;">
            <form id="login-form">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Username" required>
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="message" style="color: red;"></p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('message').innerText = data.msg;
                }
            } catch (err) {
                document.getElementById('message').innerText = 'Server error';
            }
        });
    </script>
</body>
</html>
