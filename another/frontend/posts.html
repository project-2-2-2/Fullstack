<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts - Full Stack App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">Full Stack App</div>
    <div class="navbar-menu" id="navbar-menu"></div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 style="color: #2c3e50; margin-bottom: 2rem;">Posts Management</h1>

    <div style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
      <button onclick="openCreatePostModal()" class="btn btn-success">Create New Post</button>
      
      <input type="text" id="post-search" placeholder="Search posts..." 
             style="flex: 1; min-width: 200px; padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px;">
      <button onclick="searchPosts()" class="btn btn-primary">Search</button>

      <select id="status-filter" onchange="filterPostsByStatus()" style="padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px;">
        <option value="">All Status</option>
        <option value="draft">Draft</option>
        <option value="published">Published</option>
      </select>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Status</th>
            <th>Views</th>
            <th>Likes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="posts-tbody">
          <tr><td colspan="7" style="text-align: center;">Loading posts...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" style="margin-top: 2rem; text-align: center;">
      <button onclick="previousPage()" id="prev-page" class="btn">Previous</button>
      <span id="page-info" style="margin: 0 1rem;"></span>
      <button onclick="nextPage()" id="next-page" class="btn">Next</button>
    </div>
  </div>

  <!-- Create/Edit Post Modal -->
  <div id="post-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; padding: 2rem;">
    <div style="background-color: white; padding: 2rem; border-radius: 4px; max-width: 600px; margin: 0 auto;">
      <h2 id="post-modal-title" style="margin-bottom: 1.5rem; color: #2c3e50;">Create New Post</h2>

      <form id="post-form" onsubmit="savePost(event)">
        <div class="form-group">
          <label for="post-title">Title:</label>
          <input type="text" id="post-title" required>
        </div>

        <div class="form-group">
          <label for="post-description">Description:</label>
          <textarea id="post-description" style="min-height: 80px;" required></textarea>
        </div>

        <div class="form-group">
          <label for="post-content">Content:</label>
          <textarea id="post-content" style="min-height: 150px;" required></textarea>
        </div>

        <div class="form-group">
          <label for="post-status">Status:</label>
          <select id="post-status">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
          </select>
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary" style="flex: 1;">Save Post</button>
          <button type="button" class="btn btn-secondary" onclick="closePostModal()" style="flex: 1;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="ui.js"></script>
  <script src="posts.js"></script>
</body>
</html>
