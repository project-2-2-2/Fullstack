<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - Full Stack App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Full Stack App</div>
    <div class="navbar-menu" id="navbar-menu"></div>
  </nav>

  <div class="container">
    <h1 style="color: #2c3e50; margin-bottom: 2rem;">My Tasks</h1>

    <div style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
      <button onclick="openCreateTaskModal()" class="btn btn-success">Add Task</button>
      <select id="status-filter" onchange="filterTasksByStatus()" style="padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px;">
        <option value="">All</option>
        <option value="todo">Todo</option>
        <option value="doing">Doing</option>
        <option value="done">Done</option>
      </select>
      <div style="margin-left: auto; color: #7f8c8d; font-size: 0.95rem;">
        Tip: click a row to highlight it
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Status</th>
            <th>Due</th>
            <th>Owner</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tasks-tbody">
          <tr><td colspan="6" style="text-align: center;">Loading tasks...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="task-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; padding: 2rem;">
    <div style="background-color: white; padding: 2rem; border-radius: 4px; max-width: 600px; margin: 0 auto;">
      <h2 id="task-modal-title" style="margin-bottom: 1.5rem; color: #2c3e50;">Add Task</h2>

      <form id="task-form" onsubmit="saveTask(event)">
        <div class="form-group">
          <label for="task-title">Title:</label>
          <input type="text" id="task-title" required>
        </div>
        <div class="form-group">
          <label for="task-details">Details:</label>
          <textarea id="task-details" style="min-height: 90px;"></textarea>
        </div>
        <div class="form-group">
          <label for="task-status">Status:</label>
          <select id="task-status">
            <option value="todo">Todo</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label for="task-due">Due date:</label>
          <input type="text" id="task-due" placeholder="YYYY-MM-DD (optional)">
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()" style="flex: 1;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="ui.js"></script>
  <script src="tasks.js"></script>
</body>
</html>
