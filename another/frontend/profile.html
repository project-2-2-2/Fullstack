<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Full Stack App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">Full Stack App</div>
    <div class="navbar-menu" id="navbar-menu"></div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div class="profile-container">
      <div id="profile-header" class="profile-header">
        <div class="profile-avatar">U</div>
        <h1 class="profile-name">Loading...</h1>
        <p class="profile-email">Loading...</p>
      </div>

      <div id="profile-info" class="profile-info">
        <p>Loading profile information...</p>
      </div>

      <h2 style="color: #2c3e50; margin-top: 2rem; margin-bottom: 1rem;">My Posts</h2>
      <div id="user-posts" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
        <p>Loading posts...</p>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div id="edit-profile-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; padding: 2rem;">
    <div style="background-color: white; padding: 2rem; border-radius: 4px; max-width: 500px; margin: 0 auto;">
      <h2 style="margin-bottom: 1.5rem; color: #2c3e50;">Edit Profile</h2>

      <form onsubmit="updateProfile(event)">
        <div class="form-group">
          <label for="edit-name-profile">Name:</label>
          <input type="text" id="edit-name-profile" required>
        </div>

        <div class="form-group">
          <label for="edit-email-profile">Email:</label>
          <input type="email" id="edit-email-profile" required>
        </div>

        <div class="form-group">
          <label for="edit-phone-profile">Phone:</label>
          <input type="tel" id="edit-phone-profile">
        </div>

        <div class="form-group">
          <label for="edit-bio-profile">Bio:</label>
          <textarea id="edit-bio-profile"></textarea>
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
          <button type="button" class="btn btn-secondary" onclick="closeEditProfileModal()" style="flex: 1;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="ui.js"></script>
  <script src="profile.js"></script>
</body>
</html>
