<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Full Stack App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">Full Stack App</div>
    <div class="navbar-menu" id="navbar-menu"></div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div class="form-container">
      <h1 style="margin-bottom: 2rem; text-align: center; color: #2c3e50;">Login</h1>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>

      <p style="margin-top: 1.5rem; text-align: center;">
        Don't have an account? <a href="register.html" style="color: #3498db; text-decoration: none;">Register here</a>
      </p>

      <div style="margin-top: 2rem; padding: 1rem; background-color: #d1ecf1; border: 1px solid #bee5eb; border-radius: 4px; color: #0c5460;">
        <strong>Demo Credentials:</strong><br>
        Email: admin@example.com<br>
        Password: admin123
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields', 'danger');
        return;
      }

      showLoader();
      const result = await loginUser(email, password);
      hideLoader();

      if (result.success) {
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } else {
        showAlert(result.message, 'danger');
      }
    });
  </script>
</body>
</html>
