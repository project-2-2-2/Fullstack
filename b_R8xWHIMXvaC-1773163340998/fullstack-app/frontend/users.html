<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Full Stack App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">Full Stack App</div>
    <div class="navbar-menu" id="navbar-menu"></div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 style="color: #2c3e50; margin-bottom: 2rem;">Users Management</h1>

    <div style="margin-bottom: 2rem; display: flex; gap: 1rem;">
      <input type="text" id="search-input" placeholder="Search by name or email..." 
             style="flex: 1; padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px;">
      <button onclick="searchUsers()" class="btn btn-primary">Search</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="6" style="text-align: center;">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div id="edit-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; padding: 2rem;">
    <div style="background-color: white; padding: 2rem; border-radius: 4px; max-width: 500px; margin: 0 auto;">
      <h2 style="margin-bottom: 1.5rem; color: #2c3e50;">Edit User</h2>

      <form onsubmit="saveUser(event)">
        <div class="form-group">
          <label for="edit-name">Name:</label>
          <input type="text" id="edit-name" required>
        </div>

        <div class="form-group">
          <label for="edit-email">Email:</label>
          <input type="email" id="edit-email" required>
        </div>

        <div class="form-group">
          <label for="edit-phone">Phone:</label>
          <input type="tel" id="edit-phone">
        </div>

        <div class="form-group">
          <label for="edit-bio">Bio:</label>
          <textarea id="edit-bio"></textarea>
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()" style="flex: 1;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/users.js"></script>
</body>
</html>
